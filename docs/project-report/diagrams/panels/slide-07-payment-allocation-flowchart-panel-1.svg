<rect x="185" y="590" width="430" height="130" rx="16" fill="#ecfdf3" stroke="#111" stroke-width="3" />
<text x="400" y="639" text-anchor="middle" class="label-sm"><tspan x="400" dy="0">Manual: Admin / Secretary</tspan><tspan x="400" dy="30">records payment</tspan></text>
<rect x="1130" y="520" width="430" height="130" rx="16" fill="#ecfdf3" stroke="#111" stroke-width="3" />
<text x="1345" y="569" text-anchor="middle" class="label-sm"><tspan x="1345" dy="0">Online: Member selects</tspan><tspan x="1345" dy="30">unpaid contributions</tspan></text>
<rect x="1130" y="750" width="430" height="150" rx="16" fill="#ecfdf3" stroke="#111" stroke-width="3" />
<text x="1345" y="809" text-anchor="middle" class="label-sm"><tspan x="1345" dy="0">Process Paystack checkout</tspan><tspan x="1345" dy="30">and callback / webhook</tspan></text>
<polygon points="1345,990 1530,1080 1345,1170 1160,1080" fill="#fff7ed" stroke="#111" stroke-width="3"/>
<text x="1345" y="1064" text-anchor="middle" class="label-sm"><tspan x="1345" dy="0">Valid status</tspan><tspan x="1345" dy="30">and amount?</tspan></text>
<rect x="1130" y="1240" width="430" height="80" rx="16" fill="#fff" stroke="#111" stroke-width="3" stroke-dasharray="10 8"/>
<text x="1345" y="1264" text-anchor="middle" class="label-sm"><tspan x="1345" dy="0">No: mark failed / review later</tspan></text>
<rect x="185" y="950" width="430" height="130" rx="16" fill="#e8f1ff" stroke="#111" stroke-width="3" />
<text x="400" y="999" text-anchor="middle" class="label-sm"><tspan x="400" dy="0">Send payment to</tspan><tspan x="400" dy="30">allocation service</tspan></text>
<path class="line-soft" d="M900 205 L900 250"/>
<path class="line-soft" d="M760 360 L600 470 L400 470 L400 590"/>
