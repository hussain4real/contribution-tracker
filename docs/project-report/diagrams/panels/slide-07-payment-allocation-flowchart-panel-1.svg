<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1380" viewBox="0 0 1800 1380">

  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth"><path d="M1,1 L13,7 L1,13 Z" fill="#111111"/></marker>
    <style><![CDATA[
      .title { font: 700 52px Arial, sans-serif; fill: #000; }
      .subtitle { font: 700 40px Arial, sans-serif; fill: #000; }
      .section { font: 700 32px Arial, sans-serif; fill: #000; }
      .label { font: 700 30px Arial, sans-serif; fill: #000; }
      .label-sm { font: 700 26px Arial, sans-serif; fill: #000; }
      .body { font: 400 24px Arial, sans-serif; fill: #000; }
      .small { font: 400 21px Arial, sans-serif; fill: #000; }
      .tiny { font: 400 18px Arial, sans-serif; fill: #000; }
      .line { stroke: #111; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #333; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #111; stroke-width: 3; stroke-dasharray: 10 8; fill: none; marker-end: url(#arrow); }
    ]]></style>
  </defs>
<rect width="1800" height="1380" fill="#fff"/>
<text x="900" y="72" text-anchor="middle" class="title"><tspan x="900" dy="0">Figure 3.3a: Payment Capture and Verification</tspan></text>
<rect x="760" y="125" width="280" height="80" rx="40" fill="#e8f1ff" stroke="#111" stroke-width="3" />
<text x="900" y="149" text-anchor="middle" class="label-sm"><tspan x="900" dy="0">Start</tspan></text>
<polygon points="900,250 1100,360 900,470 700,360" fill="#fff7ed" stroke="#111" stroke-width="3"/>
