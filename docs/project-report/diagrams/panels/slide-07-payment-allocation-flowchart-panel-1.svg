<path class="line-soft" d="M1040 360 L1345 450 L1345 520"/>
<text x="1359" y="440" text-anchor="start" class="tiny"><tspan x="1359" dy="0">Online</tspan></text>
<path class="line-soft" d="M1345 650 L1345 750"/>
<path class="line-soft" d="M1345 900 L1345 990"/>
<path class="line-soft" d="M1160 1080 L890 1080 L890 1015 L615 1015"/>
