<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #f8fafc; stroke: #1e293b; stroke-width: 3; rx: 14; }
      .main { fill: #e0f2fe; stroke: #075985; stroke-width: 4; rx: 16; }
      .ai { fill: #fef3c7; stroke: #92400e; stroke-width: 3; rx: 14; }
      .pay { fill: #dcfce7; stroke: #166534; stroke-width: 3; rx: 14; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 25px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 19px Arial, sans-serif; fill: #334155; }
      .rel { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M2,2 L11,6 L2,10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <text x="800" y="58" text-anchor="middle" class="title">FamilyFunds Entity-Relationship Diagram</text>

  <rect x="660" y="105" width="280" height="120" class="main"/>
  <text x="800" y="150" text-anchor="middle" class="label">families</text>
  <text x="800" y="182" text-anchor="middle" class="small">Tenant boundary</text>

  <rect x="120" y="300" width="260" height="115" class="box"/>
