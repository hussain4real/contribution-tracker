  <text x="620" y="817" text-anchor="middle" class="label">platform_plans</text>
  <text x="620" y="849" text-anchor="middle" class="small">Subscription limits</text>

  <rect x="850" y="775" width="270" height="115" class="ai"/>
  <text x="985" y="817" text-anchor="middle" class="label">agent_conversations</text>
