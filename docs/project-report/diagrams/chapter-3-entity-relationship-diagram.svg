  <rect x="120" y="540" width="260" height="115" class="box"/>
  <text x="250" y="582" text-anchor="middle" class="label">expenses</text>
  <text x="250" y="614" text-anchor="middle" class="small">Outgoing funds</text>

  <rect x="470" y="540" width="300" height="115" class="box"/>
  <text x="620" y="582" text-anchor="middle" class="label">fund_adjustments</text>
  <text x="620" y="614" text-anchor="middle" class="small">Donations/corrections</text>

  <rect x="850" y="540" width="270" height="115" class="box"/>
  <text x="985" y="582" text-anchor="middle" class="label">family_invitations</text>
  <text x="985" y="614" text-anchor="middle" class="small">Signed invitation links</text>

  <rect x="1210" y="540" width="260" height="115" class="pay"/>
