<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Offline - FamilyFunds</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background-color: #ffffff;
            color: #1a1a1a;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #1a1a1a;
                color: #e5e5e5;
            }

            .description {
                color: #a3a3a3;
            }

            .btn {
                background-color: #e5e5e5;
                color: #1a1a1a;
            }

            .btn:hover {
                background-color: #d4d4d4;
            }

            .btn-secondary {
                border-color: #404040;
                color: #a3a3a3;
            }

            .btn-secondary:hover {
                background-color: #262626;
                color: #e5e5e5;
            }

            .status-dot {
                background-color: #ef4444;
            }
        }

        .container {
            max-width: 28rem;
            text-align: center;
        }

        .logo {
            width: 4rem;
            height: 4rem;
            border-radius: 1rem;
            margin: 0 auto 1.25rem;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        .description {
            font-size: 0.875rem;
            line-height: 1.625;
            color: #737373;
            margin-bottom: 1.5rem;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            font-size: 0.75rem;
            color: #737373;
            margin-bottom: 1.5rem;
        }

        .status-dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 9999px;
            background-color: #dc2626;
        }

        .status-dot.online {
            background-color: #16a34a;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.625rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background-color: #1a1a1a;
            color: #ffffff;
            transition: background-color 0.15s;
            text-decoration: none;
            width: 100%;
        }

        .btn:hover {
            background-color: #333333;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            color: #737373;
            border: 1px solid #e5e5e5;
        }

        .btn-secondary:hover {
            background-color: #f5f5f5;
            color: #1a1a1a;
        }

        .countdown {
            font-variant-numeric: tabular-nums;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="/pwa-192x192.png" alt="FamilyFunds" class="logo" />
        <h1 class="title">You're Offline</h1>
        <p class="description">
            Check your connection and try again. Pages you've visited recently may still be available.
        </p>

        <div class="status" id="status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">No connection</span>
        </div>

        <div class="buttons">
            <button class="btn" id="retry-btn" onclick="retry()">
                Try Again
            </button>
            <a href="/dashboard" class="btn btn-secondary">
                Go to Dashboard
            </a>
        </div>
    </div>

    <script>
        var retryBtn = document.getElementById('retry-btn');
        var statusDot = document.getElementById('status-dot');
        var statusText = document.getElementById('status-text');
        var countdownSeconds = 10;
        var countdownTimer = null;

        function retry() {
            retryBtn.disabled = true;
            retryBtn.textContent = 'Checking…';

            fetch(window.location.href, { cache: 'no-store' })
                .then(function (r) {
                    if (r.ok) {
                        window.location.reload();
                    } else {
                        retryFailed();
                    }
                })
                .catch(function () {
                    retryFailed();
                });
        }

        function retryFailed() {
            countdownSeconds = 10;
            retryBtn.disabled = true;
            updateCountdown();
            countdownTimer = setInterval(function () {
                countdownSeconds--;
                if (countdownSeconds <= 0) {
                    clearInterval(countdownTimer);
                    retryBtn.disabled = false;
                    retryBtn.textContent = 'Try Again';
                    retry();
                } else {
                    updateCountdown();
                }
            }, 1000);
        }

        function updateCountdown() {
            retryBtn.textContent = 'Retrying in ' + countdownSeconds + 's…';
        }

        window.addEventListener('online', function () {
            statusDot.classList.add('online');
            statusText.textContent = 'Back online — reloading…';
            clearInterval(countdownTimer);
            window.location.reload();
        });
    </script>
</body>

</html>
