  <text x="600" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="32" fill="rgba(255,255,255,0.85)">Track family contributions with ease</text>
  <!-- URL -->
  <text x="600" y="580" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="24" fill="rgba(255,255,255,0.6)">familyfunds.app</text>
