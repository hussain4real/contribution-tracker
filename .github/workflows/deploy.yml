name: Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node Dependencies
        run: npm ci

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Generate Wayfinder Routes
        run: php artisan wayfinder:generate

      - name: Build Assets
        run: npm run build

      - name: Run Tests
        run: ./vendor/bin/pest

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deployer
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/contribution-tracker

            # Pull latest changes
            git pull origin main

            # Install PHP dependencies
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

            # Generate VAPID keys once for web push notifications
            if ! grep -Eq '^VAPID_PUBLIC_KEY=.+$' .env || ! grep -Eq '^VAPID_PRIVATE_KEY=.+$' .env; then
              echo "Generating VAPID keys..."
              php artisan config:clear
              php artisan webpush:vapid --force --no-interaction
            else
              echo "VAPID keys already configured; skipping generation."
            fi

            # Install Node dependencies and build assets
            npm ci
            php artisan optimize:clear
            rm -rf resources/js/actions resources/js/routes resources/js/wayfinder
            php artisan wayfinder:generate
            npm run build

            # Run database migrations
            php artisan migrate --force

            # Clear and rebuild caches
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # Restart queue workers, SSR server, and Nightwatch agent
            sudo supervisorctl restart queue-worker:*
            sudo supervisorctl restart ssr
            sudo supervisorctl restart nightwatch

            # Reload PHP-FPM gracefully
            sudo systemctl reload php8.4-fpm

            echo "Deployment complete!"
